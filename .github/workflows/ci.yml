name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  build:
    name: Build CLI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -buildvcs=false -o bin/atmosctl ./cmd/atmosctl

      - name: Verify CLI
        run: |
          bin/atmosctl version
          bin/atmosctl --json version

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Check release config
        run: make release-check

      - name: Build snapshot packages
        run: make package

  fedora44-install:
    name: Fedora 44 RPM install
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Build snapshot packages
        run: make package

      - name: Verify Fedora 44 RPM install
        run: |
          docker run --rm -v "$PWD/dist:/dist:ro" fedora:44 sh -euxc '
            dnf install -y /dist/*.rpm
            atmosctl version
            atmosctl --json version
            rpm -q atmosctl
            rpm -ql atmosctl
          '
